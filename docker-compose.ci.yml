# CI/CD 테스트용 Docker Compose 설정
version: '3.8'

services:
  # MySQL 테스트 데이터베이스
  mysql-test:
    image: mysql:8.0
    container_name: peoplejob-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: testpassword
      MYSQL_DATABASE: peoplejob_test
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpassword
    ports:
      - "3307:3306"
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ptestpassword"]
      timeout: 5s
      retries: 3
      interval: 10s
      start_period: 30s

  # Redis 테스트 인스턴스
  redis-test:
    image: redis:7-alpine
    container_name: peoplejob-redis-test
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 3
      interval: 5s

  # 백엔드 테스트 환경
  backend-test:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: peoplejob-backend-test
    ports:
      - "9001:9000"
    depends_on:
      mysql-test:
        condition: service_healthy
      redis-test:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: test
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-test:3306/peoplejob_test
      SPRING_DATASOURCE_USERNAME: testuser
      SPRING_DATASOURCE_PASSWORD: testpassword
      REDIS_HOST: redis-test
      REDIS_PORT: 6379
      JWT_SECRET: test-jwt-secret-key-must-be-at-least-32-characters-long
      SERVER_PORT: 9000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/actuator/health"]
      timeout: 10s
      retries: 5
      interval: 30s
      start_period: 60s
    command: >
      sh -c "
        ./mvnw clean test &&
        ./mvnw spring-boot:run
      "

networks:
  default:
    name: peoplejob-test-network
    driver: bridge