<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피플잡 비밀번호 재설정</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #dc2626; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; background: #f8f9fa; }
        .button { display: inline-block; padding: 12px 30px; background: #dc2626;
                 color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .warning { background: #fef2f2; border: 1px solid #fecaca; padding: 15px;
                  border-radius: 5px; color: #dc2626; }
        .footer { text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🔒 비밀번호 재설정</h1>
    </div>
    <div class="content">
        <h2 th:text="'안녕하세요, ' + ${username} + '님!'">안녕하세요!</h2>
        <p>피플잡 계정의 비밀번호 재설정을 요청하셨습니다.</p>
        <p>아래 버튼을 클릭하여 새로운 비밀번호를 설정해주세요.</p>

        <div style="text-align: center;">
            <a th:href="${resetLink}" class="button">비밀번호 재설정하기</a>
        </div>

        <div class="warning">
            <h3>⚠️ 보안 안내</h3>
            <ul>
                <li>이 링크는 15분 후 만료됩니다.</li>
                <li>본인이 요청하지 않은 경우 즉시 고객센터로 연락해주세요.</li>
                <li>링크는 일회성이며, 사용 후 자동으로 무효화됩니다.</li>
            </ul>
        </div>
    </div>
    <div class="footer">
        <p>© 2025 피플잡. All rights reserved.</p>
    </div>
</div>
</body>
</html>
