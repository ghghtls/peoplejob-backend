<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>피플잡 회원가입 인증</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #2563eb; color: white; padding: 20px; text-align: center; }
        .content { padding: 30px; background: #f8f9fa; }
        .button { display: inline-block; padding: 12px 30px; background: #2563eb;
                 color: white; text-decoration: none; border-radius: 5px; margin: 20px 0; }
        .code { font-size: 24px; font-weight: bold; color: #2563eb;
               background: white; padding: 15px; border-radius: 5px; text-align: center; }
        .footer { text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>피플잡 회원가입 인증</h1>
    </div>
    <div class="content">
        <h2 th:text="'안녕하세요, ' + ${username} + '님!'">안녕하세요!</h2>
        <p>피플잡에 회원가입해주셔서 감사합니다.</p>
        <p>아래 인증코드를 입력하거나 버튼을 클릭하여 이메일 인증을 완료해주세요.</p>

        <div class="code" th:text="${verificationCode}">123456</div>

        <div style="text-align: center;">
            <a th:href="${verificationLink}" class="button">이메일 인증 완료</a>
        </div>

        <p><strong>주의사항:</strong></p>
        <ul>
            <li>인증코드는 30분 후 만료됩니다.</li>
            <li>본인이 요청하지 않은 경우 이 메일을 무시해주세요.</li>
        </ul>
    </div>
    <div class="footer">
        <p>© 2025 피플잡. All rights reserved.</p>
    </div>
</div>
</body>
</html>
