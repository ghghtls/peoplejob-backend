# 테스트 환경 전용 설정
spring:
  # 데이터베이스 설정 (H2 인메모리)
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  # JPA/Hibernate 설정
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        show_sql: false
        format_sql: false
        dialect: org.hibernate.dialect.H2Dialect
        use_sql_comments: false
        jdbc:
          time_zone: Asia/Seoul
    open-in-view: false

  # H2 콘솔 설정
  h2:
    console:
      enabled: true
      path: /h2-console

  # 테스트용 Redis 설정 (임베디드 Redis 사용)
  data:
    redis:
      repositories:
        enabled: false  # 테스트에서는 Redis Repository 비활성화

  # 이메일 테스트 설정 (실제 발송 안함)
  mail:
    host: localhost
    port: 25
    username: test
    password: test
    protocol: smtp
    test-connection: false
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
          ssl:
            enable: false

  # 캐시 비활성화 (테스트 격리)
  cache:
    type: none

  # 서블릿 설정
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

  # JSON 설정
  jackson:
    time-zone: Asia/Seoul
    date-format: yyyy-MM-dd HH:mm:ss

# 테스트용 JWT 설정
jwt:
  secret: test-jwt-secret-key-for-unit-testing-only-must-be-32-chars-long-minimum
  expiration-ms: 3600000  # 1시간

# 테스트용 파일 업로드 설정
file:
  upload:
    path: ./test-uploads
    url: http://localhost:9000/test-uploads
    max-size: 5MB

# 테스트용 이메일 설정
email:
  from: noreply@test.com
  verification:
    expiration-minutes: 30
  reset-password:
    expiration-minutes: 15

# 테스트용 CORS 설정
cors:
  allowed-origins: http://localhost:3000,http://localhost:8080
  allowed-methods: GET,POST,PUT,DELETE,OPTIONS,PATCH
  allowed-headers: "*"
  allow-credentials: true

# 테스트용 스케줄러 비활성화
scheduling:
  enabled: false

# 테스트용 비동기 처리 설정
async:
  core-pool-size: 2
  max-pool-size: 5
  queue-capacity: 10

# 로깅 최소화
logging:
  level:
    root: WARN
    com.people.job: INFO
    org.springframework.test: INFO
    org.hibernate.SQL: WARN
    org.hibernate.type: WARN
    org.springframework.web: WARN
    org.springframework.security: WARN
    com.zaxxer.hikari: WARN
    org.apache.http: WARN
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

# 액추에이터 테스트 설정
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
    db:
      enabled: true

# 테스트 전용 Mock 설정
mock:
  external-apis: true
  email-service: true
  payment-service: true
  file-service: false

# 테스트 데이터 설정
test-data:
  auto-create: false
  cleanup-after-test: true