name: Backend CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Java 17 + H2 + Redis)
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run tests
        run: ./mvnw test -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci_test_secret_key_must_be_at_least_256_bits_long_for_hs256
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MAIL_HOST: localhost
          MAIL_PORT: 25
          MAIL_USERNAME: ci@test.com
          MAIL_PASSWORD: test

      - name: Generate coverage report
        run: ./mvnw jacoco:report -Dspring.profiles.active=test
        env:
          JWT_SECRET: ci_test_secret_key_must_be_at_least_256_bits_long_for_hs256
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          MAIL_HOST: localhost
          MAIL_PORT: 25
          MAIL_USERNAME: ci@test.com
          MAIL_PASSWORD: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-coverage
          path: target/site/jacoco/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 7
