name: Backend CI/CD Pipeline

# 트리거 조건
on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci-cd.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'backend/**'

# 환경 변수
env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx1024m'
  DOCKER_IMAGE: peoplejob-backend
  AWS_REGION: ap-northeast-2

jobs:
  # ==================== 테스트 및 빌드 ====================
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest

    services:
      # 테스트용 MySQL
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: peoplejob_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      # 테스트용 Redis
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. JDK 설정
      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      # 3. Maven Wrapper 실행 권한 부여
      - name: Make mvnw executable
        run: chmod +x ./mvnw
        working-directory: ./

      # 4. 의존성 다운로드 및 캐시
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # 5. 테스트 실행
      - name: Run tests
        run: ./mvnw clean test
        env:
          SPRING_PROFILES_ACTIVE: test
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/peoplejob_test
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpassword
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: ${{ secrets.JWT_SECRET_TEST }}

      # 6. 테스트 결과 업로드
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: target/surefire-reports/

      # 7. 애플리케이션 빌드
      - name: Build application
        run: ./mvnw clean package -DskipTests
        env:
          SPRING_PROFILES_ACTIVE: prod

      # 8. JAR 파일 업로드
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v3
        with:
          name: application-jar
          path: target/*.jar

  # ==================== 코드 품질 검사 ====================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: test-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      # SpotBugs로 정적 코드 분석
      - name: Run SpotBugs analysis
        run: ./mvnw spotbugs:check
        continue-on-error: true

      # 코드 커버리지 측정 (JaCoCo)
      - name: Generate coverage report
        run: ./mvnw jacoco:report

      - name: Upload coverage reports
        uses: actions/upload-artifact@v3
        with:
          name: coverage-reports
          path: target/site/jacoco/

  # ==================== Docker 이미지 빌드 ====================
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test-and-build, code-quality]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download JAR artifact
        uses: actions/download-artifact@v3
        with:
          name: application-jar
          path: target/

      # Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # AWS ECR 로그인
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # Docker 이미지 빌드 및 푸시
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: peoplejob-backend
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # 이미지 빌드
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          
          # 이미지 푸시
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          
          # 이미지 정보 저장
          echo "IMAGE_URI=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_ENV

      # 이미지 취약점 스캔
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_URI }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  # ==================== 배포 (개발 환경) ====================
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ECS 서비스 업데이트
      - name: Deploy to ECS Development
        run: |
          # 새로운 태스크 정의 생성
          aws ecs register-task-definition \
            --family peoplejob-backend-dev \
            --network-mode awsvpc \
            --requires-compatibilities FARGATE \
            --cpu 512 \
            --memory 1024 \
            --execution-role-arn ${{ secrets.ECS_EXECUTION_ROLE_ARN }} \
            --task-role-arn ${{ secrets.ECS_TASK_ROLE_ARN }} \
            --container-definitions '[{
              "name": "peoplejob-backend",
              "image": "${{ secrets.ECR_REGISTRY }}/peoplejob-backend:${{ github.sha }}",
              "portMappings": [{
                "containerPort": 8080,
                "protocol": "tcp"
              }],
              "environment": [
                {"name": "SPRING_PROFILES_ACTIVE", "value": "dev"},
                {"name": "SPRING_DATASOURCE_URL", "value": "${{ secrets.DEV_DATABASE_URL }}"},
                {"name": "REDIS_HOST", "value": "${{ secrets.DEV_REDIS_HOST }}"}
              ],
              "secrets": [
                {"name": "JWT_SECRET", "valueFrom": "${{ secrets.JWT_SECRET_ARN }}"},
                {"name": "SPRING_DATASOURCE_PASSWORD", "valueFrom": "${{ secrets.DB_PASSWORD_ARN }}"}
              ],
              "logConfiguration": {
                "logDriver": "awslogs",
                "options": {
                  "awslogs-group": "/ecs/peoplejob-backend-dev",
                  "awslogs-region": "${{ env.AWS_REGION }}",
                  "awslogs-stream-prefix": "ecs"
                }
              }
            }]'
          
          # 서비스 업데이트
          aws ecs update-service \
            --cluster peoplejob-dev \
            --service peoplejob-backend-dev \
            --task-definition peoplejob-backend-dev \
            --force-new-deployment

      # 배포 확인
      - name: Wait for deployment
        run: |
          aws ecs wait services-stable \
            --cluster peoplejob-dev \
            --services peoplejob-backend-dev

      # 헬스 체크
      - name: Health check
        run: |
          sleep 30
          curl -f ${{ secrets.DEV_API_URL }}/actuator/health || exit 1

  # ==================== 배포 (운영 환경) ====================
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Blue-Green 배포
      - name: Blue-Green Deploy to Production
        run: |
          # 현재 활성 서비스 확인
          CURRENT_SERVICE=$(aws elbv2 describe-target-groups \
            --target-group-arns ${{ secrets.PROD_TARGET_GROUP_ARN }} \
            --query 'TargetGroups[0].Tags[?Key==`Environment`].Value' \
            --output text)
          
          if [ "$CURRENT_SERVICE" = "blue" ]; then
            NEW_SERVICE="green"
            NEW_TARGET_GROUP="${{ secrets.PROD_GREEN_TARGET_GROUP_ARN }}"
          else
            NEW_SERVICE="blue"
            NEW_TARGET_GROUP="${{ secrets.PROD_BLUE_TARGET_GROUP_ARN }}"
          fi
          
          echo "Deploying to $NEW_SERVICE environment"
          
          # 새로운 태스크 정의로 서비스 업데이트
          aws ecs update-service \
            --cluster peoplejob-prod \
            --service peoplejob-backend-$NEW_SERVICE \
            --task-definition peoplejob-backend-prod:LATEST \
            --force-new-deployment
          
          # 배포 완료 대기
          aws ecs wait services-stable \
            --cluster peoplejob-prod \
            --services peoplejob-backend-$NEW_SERVICE
          
          # 헬스 체크
          sleep 60
          HEALTH_CHECK=$(curl -s -o /dev/null -w "%{http_code}" ${{ secrets.PROD_API_URL }}/actuator/health)
          
          if [ "$HEALTH_CHECK" = "200" ]; then
            echo "Health check passed, switching traffic"
          
            # 트래픽 전환
            aws elbv2 modify-listener \
              --listener-arn ${{ secrets.PROD_LISTENER_ARN }} \
              --default-actions Type=forward,TargetGroupArn=$NEW_TARGET_GROUP
          
            echo "Deployment successful!"
          else
            echo "Health check failed, rolling back"
            exit 1
          fi

      # 배포 알림
      - name: Notify deployment
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#deployments'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
          fields: repo,message,commit,author,action,eventName,ref,workflow

  # ==================== 배포 후 테스트 ====================
  post-deploy-test:
    name: Post-deployment Tests
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always() && (needs.deploy-dev.result == 'success' || needs.deploy-prod.result == 'success')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # API 통합 테스트
      - name: Run API integration tests
        run: |
          # 환경에 따른 API URL 설정
          if [ "${{ github.ref }}" = "refs/heads/develop" ]; then
            API_URL="${{ secrets.DEV_API_URL }}"
          else
            API_URL="${{ secrets.PROD_API_URL }}"
          fi
          
          # 기본 헬스 체크
          curl -f $API_URL/actuator/health
          
          # API 엔드포인트 테스트
          curl -f $API_URL/api/jobs
          curl -f $API_URL/api/users/check/testuser

      # 성능 테스트 (간단한 버전)
      - name: Performance test
        run: |
          # Apache Bench로 간단한 성능 테스트
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            API_URL="${{ secrets.PROD_API_URL }}"
            ab -n 100 -c 10 $API_URL/api/jobs
          fi

  # ==================== 정리 작업 ====================
  cleanup:
    name: Cleanup
    runs-on: ubuntu-latest
    needs: [deploy-dev, deploy-prod]
    if: always()

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 오래된 ECR 이미지 정리
      - name: Cleanup old ECR images
        run: |
          aws ecr list-images \
            --repository-name peoplejob-backend \
            --filter tagStatus=UNTAGGED \
            --query 'imageIds[?imageDigest!=null]' \
            --output json | jq '.[] | select(.imagePushedAt < (now - 7*24*60*60))' | \
          aws ecr batch-delete-image \
            --repository-name peoplejob-backend \
            --image-ids file:///dev/stdin || true